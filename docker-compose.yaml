version: '3.8'

services:
  # ==========================================
  # INFRASTRUCTURE DEPENDENCIES
  # ==========================================
  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"     
      - "15672:15672"   

  # ==========================================
  # ELSA SERVER CLUSTER (3 Replicas)
  # ==========================================
  elsa-node-1:
    build: 
      context: .
      dockerfile: Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - TZ=UTC
      - ConnectionStrings__MongoDb=mongodb://mongodb:27017/ElsaDB
      - ConnectionStrings__Redis=redis:6379
      - ConnectionStrings__RabbitMq=amqp://guest:guest@rabbitmq:5672/
      - Logging__LogLevel__Microsoft.Hosting.Lifetime=Warning
      - Logging__LogLevel__Elsa=Warning
    depends_on:
      - mongodb
      - rabbitmq
      - redis

  elsa-node-2:
    build: 
      context: .
      dockerfile: Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - TZ=UTC
      - ConnectionStrings__MongoDb=mongodb://mongodb:27017/ElsaDB
      - ConnectionStrings__Redis=redis:6379
      - ConnectionStrings__RabbitMq=amqp://guest:guest@rabbitmq:5672/
      - Logging__LogLevel__Microsoft.Hosting.Lifetime=Warning
      - Logging__LogLevel__Elsa=Warning
    depends_on:
      - mongodb
      - rabbitmq
      - redis

  elsa-node-3:
    build: 
      context: .
      dockerfile: Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - TZ=UTC
      - ConnectionStrings__MongoDb=mongodb://mongodb:27017/ElsaDB
      - ConnectionStrings__Redis=redis:6379
      - ConnectionStrings__RabbitMq=amqp://guest:guest@rabbitmq:5672/
      - Logging__LogLevel__Microsoft.Hosting.Lifetime=Warning
      - Logging__LogLevel__Elsa=Warning
    depends_on:
      - mongodb
      - rabbitmq
      - redis

  # ==========================================
  # ELSA STUDIO UI
  # ==========================================
  elsa-studio:
    image: elsaworkflows/elsa-studio-v3:latest
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - HTTP_PORTS=8080 
      - HTTP__BASEURL=http://localhost:8180 
      - ELSASERVER__URL=http://localhost:8101/elsa/api 
    ports:
      - "8180:8080" 
    depends_on:
      - gateway

  # ==========================================
  # LOCAL GATEWAY (LOAD BALANCER)
  # ==========================================
  gateway:
    image: nginx:alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8101:80" 
    depends_on:
      - elsa-node-1
      - elsa-node-2
      - elsa-node-3
